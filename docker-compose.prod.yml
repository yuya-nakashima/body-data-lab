services:
  app:
    build: .
    container_name: body-data-lab-app
    ports:
      - "127.0.0.1:8000:8000"    # nginx 経由のみ外部公開。8000 は外部に直接開放しない
    volumes:
      - /home/ec2-user/body-data-lab/data:/app/data
    env_file:
      - .env
    environment:
      - DB_PATH=/app/data/body_data_lab.sqlite3
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
