name: PR Auto Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get diff
        id: diff
        run: |
          git fetch origin ${{ github.base_ref }}
          DIFF=$(git diff origin/${{ github.base_ref }}...HEAD -- '*.py' | head -c 8000)
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Claude PR Review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          DIFF: ${{ steps.diff.outputs.diff }}
        run: |
          pip install anthropic --quiet

          python3 << 'PYEOF'
          import anthropic
          import os
          import subprocess

          diff = os.environ.get("DIFF", "")
          if not diff.strip():
              print("差分なし。レビューをスキップします。")
              exit(0)

          client = anthropic.Anthropic(api_key=os.environ["ANTHROPIC_API_KEY"])
          message = client.messages.create(
              model="claude-sonnet-4-6",
              max_tokens=1024,
              messages=[
                  {
                      "role": "user",
                      "content": f"""以下の Python コードの差分をレビューしてください。

観点:
- バグ・クラッシュの可能性
- セキュリティ上の問題
- 明らかなロジックの誤り

問題がなければ「問題なし」とだけ返してください。
問題がある場合のみ、箇条書きで簡潔に指摘してください。
改善提案や細かいスタイルの指摘は不要です。

```diff
{diff}
```""",
                  }
              ],
          )

          review = message.content[0].text
          pr = os.environ["PR_NUMBER"]
          repo = os.environ["REPO"]
          token = os.environ["GH_TOKEN"]

          import urllib.request, json
          body = json.dumps({"body": f"🤖 **自動レビュー**\n\n{review}"}).encode()
          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/issues/{pr}/comments",
              data=body,
              headers={
                  "Authorization": f"Bearer {token}",
                  "Content-Type": "application/json",
              },
          )
          urllib.request.urlopen(req)
          print("レビューコメントを投稿しました。")
          PYEOF
